services:
  nova:
    build: .
    restart: unless-stopped
    working_dir: /home/agent
    volumes:
      - agent-home:/home/agent
      - ./mounts/claude/.credentials.json:/home/agent/.claude/.credentials.json
      - ./mounts/claude/projects:/home/agent/.claude/projects
      - ./mounts/claude/CLAUDE.md:/home/agent/.claude/CLAUDE.md
      - ./mounts/claude/settings.json:/home/agent/.claude/settings.json
      - ./mounts/claude/statusline-command.sh:/home/agent/.claude/statusline-command.sh
      - ./mounts/claude/test_statusline.sh:/home/agent/.claude/test_statusline.sh
      - ./mounts/claude/skills:/home/agent/.claude/skills
      - ./mounts/nova:/home/agent/.nova
      - .:/home/agent/workspace
    command: /home/agent/workspace/bin/nova --config /home/agent/.nova/config.toml

volumes:
  agent-home:

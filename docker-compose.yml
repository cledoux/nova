services:
  nova:
    build: .
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - agent-home:/home/agent
      - ./mounts/claude:/home/agent/.claude
      - ./mounts/nova:/home/agent/.nova
      - .:/workspace
    command: /workspace/bin/nova --config /home/agent/.nova/config.toml

volumes:
  agent-home:
